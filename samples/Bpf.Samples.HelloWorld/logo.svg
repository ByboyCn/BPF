<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <!-- 背景圆角矩形 -->
  <rect x="2" y="2" width="96" height="96" rx="18" ry="18" fill="#2D7FF9"/>
  <!-- 白色大圆 -->
  <circle cx="50" cy="42" r="24" fill="#FFFFFF"/>
  <!-- 蓝色对勾(用 path 的 M/L) -->
  <path d="M 36 42 L 47 53 L 66 32" fill="none" stroke="#2D7FF9" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 底部装饰三角形(用 polygon) -->
  <polygon points="50,88 30,70 70,70" fill="#FFFFFF" opacity="0.85"/>
  <!-- 小红点(测试 ellipse) -->
  <ellipse cx="78" cy="22" rx="7" ry="7" fill="#FF4D4F"/>
</svg>
